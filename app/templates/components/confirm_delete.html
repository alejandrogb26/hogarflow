{#
  Component: confirm_delete_modal
  Variables:
    - modal_id: unique id string
    - form_action: url for POST
    - title: string
    - message: string
    - confirm_label: string (default "Eliminar")
#}
<div x-data="{ open: false }" id="{{ modal_id }}-wrapper">
  <!-- Trigger button (slot-like: the calling template passes a trigger) -->
  <button type="button" @click="open = true"
     class="p-2 rounded-xl text-neutral-subtle hover:text-expense hover:bg-expense-bg transition-base active:scale-95"
     title="{{ confirm_label | default('Eliminar') }}">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
    </svg>
  </button>

  <!-- Backdrop + modal -->
  <div x-show="open" x-transition.opacity class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-black/60 backdrop-blur-sm" @click.self="open = false">
    <div x-show="open" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
         class="w-full max-w-sm bg-bg-card rounded-3xl border border-bg-border p-6 shadow-card">
      <div class="w-12 h-12 rounded-2xl bg-expense-bg mx-auto mb-4 flex items-center justify-center">
        <svg class="w-6 h-6 text-expense" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <h3 class="text-base font-semibold text-neutral-text text-center mb-2">{{ title }}</h3>
      <p class="text-sm text-neutral-muted text-center mb-6">{{ message }}</p>
      <div class="flex gap-3">
        <button type="button" @click="open = false"
                class="flex-1 py-3 rounded-xl bg-bg-elevated border border-bg-border text-sm font-medium text-neutral-muted hover:text-neutral-text transition-base">
          Cancelar
        </button>
        <form action="{{ form_action }}" method="POST" class="flex-1">
          <button type="submit"
                  class="w-full py-3 rounded-xl bg-expense text-white text-sm font-semibold hover:bg-expense-light transition-base active:scale-95">
            {{ confirm_label | default("Eliminar") }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
